{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Email Sent | Skill Swap</title>

<link rel="icon" href="{% static 'images/logo/skillswap.ico' %}">

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css"/>
<link rel="stylesheet" href="{% static 'core/css/index-style.css' %}"/>

<style>
/* Full Login-style copied */
.login-wrapper {
    min-height: 70vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.login-card {
    width: 100%;
    max-width: 420px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    color: rgb(224, 220, 188);
    text-align: center;
}

.login-card h2 {
    margin-bottom: 20px;
    font-weight: 700;
    color: rgb(224, 220, 188);
}

.login-card p {
    margin-bottom: 25px;
    font-size: 16px;
    line-height: 1.5;
}

.login-card .btn {
    margin-top: 10px;
    width: 100%;
    border-radius: 25px;
    padding: 12px;
    background-color: rgb(224,220,188);
    color: #000;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.login-card .btn:hover {
    background-color: rgba(224,220,188,0.8);
}

.login-links {
    margin-top: 20px;
}

.login-links a {
    color: rgb(224,220,188);
    text-decoration: none;
}

.login-links a:hover {
    text-decoration: underline;
}

@media (max-width: 576px) {
    .login-card {
        padding: 30px 25px;
    }
}
</style>
</head>
<body>

<header>
    <a href="{% url 'core:index' %}">
        <img src="{% static 'images/logo/skillswap-png.png' %}" class="logo" alt="SkillSwap Logo"/>
    </a>
</header>

<main class="login-wrapper">
    <div class="login-card">
        <h2>Check Your Email</h2>
        <p>If an account exists with the email provided, you will receive instructions to reset your password.</p>
        <a href="{% url 'login' %}" class="btn">Back to Login</a>
    </div>
</main>

</body>
</html>
